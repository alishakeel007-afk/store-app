<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Assignment Store{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="{{ url_for('storefront') }}">Assignment Store</a>
      <nav>
        <a href="{{ url_for('storefront') }}" id="store-link">Store</a>
        <a href="{{ url_for('manager_login') }}" id="manager-link">Manager</a>
      </nav>
    </header>

    <main class="page">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="messages" data-testid="messages">
            {% for category, message in messages %}
              <p class="alert alert-{{ category }}" data-testid="flash-message">{{ message }}</p>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
